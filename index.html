<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
    /* Colorful laptop wallpaper style background */
    body {
        background-image: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.3)), 
                          url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    /* Changed to a modern, lighter charcoal black face */
    .signup-container {
        background-color: #252525;
        border: 1px solid #3d3d3d;
        border-radius: 12px; 
        padding: 30px;
        width: 320px; 
        box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.5);
        box-sizing: border-box;
    }

    .signup-container h2 {
        color: #ffffff;
        text-align: center; 
        font-style: oblique;
        margin-top: 0;
        margin-bottom: 25px;
        font-size: 24px;
        letter-spacing: 0.5px;
    }

    /* Input fields matching the lighter dark theme layout */
    input[type="email"],
    input[type="tel"],
    .password-container {
        width: 100%;
        height: 45px; 
        box-sizing: border-box;
        background-color: #2d2d2d;
        border: 1px solid #4a4a4a;
        border-radius: 6px;
        margin-bottom: 18px;
    }

    input[type="email"],
    input[type="tel"] {
        padding: 0 12px;
        color: #ffffff;
        outline: none;
        font-size: 14px;
    }

    .password-container {
        position: relative;
        display: flex;
        align-items: center;
    }

    .password-container input {
        width: 85%;
        height: 100%;
        padding: 0 12px;
        outline: none;
        border: none;
        background-color: transparent;
        color: #ffffff;
        font-size: 14px;
        box-sizing: border-box;
    }

    /* Input focus border color updates */
    input[type="email"]:focus,
    input[type="tel"]:focus,
    .password-container:focus-within {
        border-color: #777777;
    }

    .eye-icon-open,
    .eye-icon-close {
        position: absolute;
        right: 12px;
        outline: none;
        font-size: 16px;
        user-select: none;
    }
    
    .eye-icon-open {
        display: none;
    }

    .eye-icon-close:hover, .eye-icon-open:hover {
        cursor: pointer;
        opacity: 0.8;
    }

    .btn-wrapper {
        display: flex;
        justify-content: center;
        width: 100%;
        margin-top: 5px;
    }

    button[type="submit"] {
        width: 100%;
        height: 45px;
        background: linear-gradient(to right, #836031, #1900ffaa);
        border: none;
        border-radius: 6px;
        color: #ffffff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s ease;
    }

    button[type="submit"]:hover {
        opacity: 0.9;
    }

    button[type="submit"]:disabled {
        background: #444444;
        color: #888888;
        cursor: not-allowed;
    }
    </style>
</head>
<body>
    
    <div class="signup-container">
        <h2>Signup</h2>
        
        <input type="email" placeholder="Enter Email" id="email">
        
        <div class="password-container">
            <input type="password" placeholder="Enter Password" id="password">
            <span class="eye-icon-open" id="openeye" onclick="SetIcon(this)">🙉</span>
            <span class="eye-icon-close" id="closeeye" onclick="SetIcon(this)">🙈</span>
        </div>
        
        <input type="tel" placeholder="Enter Phone No" id="contact">
        
        <div class="btn-wrapper">
            <button type="submit" id="submitbtn" onclick="Submit()">Submit</button>
        </div>
    </div>   

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="./app.20.js"></script>
</body>
</html>
